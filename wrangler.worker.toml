name = "quidsafe-api"
main = "worker/index.ts"
compatibility_date = "2025-04-01"

# ─── Admin dashboard ──────────────────────────────────────
# ADMIN_EMAILS is a comma-separated allowlist for /admin/* routes.
# It's treated as a secret (contains PII) - set per env via:
#   wrangler secret put ADMIN_EMAILS --config wrangler.worker.toml --env dev
#   wrangler secret put ADMIN_EMAILS --config wrangler.worker.toml --env staging
#   wrangler secret put ADMIN_EMAILS --config wrangler.worker.toml --env production
# Value example: "you@example.com,cofounder@example.com"

# Daily bank transaction sync at 6:00 AM UTC
[triggers]
crons = ["0 6 * * *"]

# Shared D1 binding name used in code - each env points to its own database
[[d1_databases]]
binding = "DB"
database_name = "quidsafe-dev"
database_id = "8bd05366-7550-4fb2-8eb0-8ec5c90ae027"
migrations_dir = "worker/migrations"

# ─── Development ───────────────────────────────────────────
[env.dev]
name = "quidsafe-api-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "quidsafe-dev"
database_id = "8bd05366-7550-4fb2-8eb0-8ec5c90ae027"
migrations_dir = "worker/migrations"

[env.dev.vars]
ENVIRONMENT = "development"
CLERK_PUBLISHABLE_KEY = "pk_live_Y2xlcmsucXVpZHNhZmUudWsk"
FROM_EMAIL = "invoices@quidsafe.uk"
TRUELAYER_SANDBOX = "true"
APP_URL = "https://api-dev.quidsafe.uk"

# ─── Staging ───────────────────────────────────────────────
# api-staging.quidsafe.uk is gated by Cloudflare Access (Zero Trust).
# Anyone hitting it gets a one-time-PIN login prompt before reaching
# the Worker. Allowlist managed at Cloudflare dashboard > Zero Trust >
# Access > Applications > "QuidSafe Staging". See docs/runbooks/staging-access.md.
[env.staging]
name = "quidsafe-api-staging"
routes = [
  { pattern = "api-staging.quidsafe.uk", custom_domain = true }
]

[[env.staging.d1_databases]]
binding = "DB"
database_name = "quidsafe-staging"
database_id = "40d33c5f-f549-4abf-8f50-08076a9b8cfc"
migrations_dir = "worker/migrations"

[env.staging.vars]
ENVIRONMENT = "staging"
CLERK_PUBLISHABLE_KEY = "pk_live_Y2xlcmsucXVpZHNhZmUudWsk"
FROM_EMAIL = "invoices@quidsafe.uk"
TRUELAYER_SANDBOX = "true"
APP_URL = "https://staging.quidsafe.uk"
TRUELAYER_REDIRECT_URI = "https://api-staging.quidsafe.uk/banking/callback"

# ─── Production ────────────────────────────────────────────
[env.production]
name = "quidsafe-api"
routes = [
  { pattern = "api.quidsafe.uk", custom_domain = true }
]

[[env.production.d1_databases]]
binding = "DB"
database_name = "quidsafe-production"
database_id = "6fcb9905-03b4-4c3b-ab0c-9443df6f6ad6"
migrations_dir = "worker/migrations"

[env.production.vars]
ENVIRONMENT = "production"
CLERK_PUBLISHABLE_KEY = "pk_live_Y2xlcmsucXVpZHNhZmUudWsk"
FROM_EMAIL = "invoices@quidsafe.uk"
TRUELAYER_SANDBOX = "false"
APP_URL = "https://quidsafe.uk"
