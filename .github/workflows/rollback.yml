name: Rollback Production

# Manual rollback for when a production deploy breaks things.
# Run via: gh workflow run rollback.yml
#   or: GitHub Actions UI > Rollback Production > Run workflow
#
# This rolls back the Worker API only. Pages web rollback is manual via
# Cloudflare dashboard (Pages > Deployments > select previous > Rollback).

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for rollback (recorded in logs)'
        required: true
        type: string
      environment:
        description: 'Which environment to rollback'
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

jobs:
  rollback:
    name: Rollback Worker
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: List recent deployments
        run: npx wrangler deployments list --config wrangler.worker.toml --env ${{ inputs.environment }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Rollback to previous version
        run: npx wrangler rollback --config wrangler.worker.toml --env ${{ inputs.environment }} --message "Rollback: ${{ inputs.reason }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify rollback
        run: |
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.quidsafe.uk/health)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Rollback successful - API responding"
          else
            echo "::warning::Health check returned $STATUS after rollback"
          fi

      - name: Summary
        run: |
          echo "### 🔄 Rollback complete" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Reason:** ${{ inputs.reason }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
