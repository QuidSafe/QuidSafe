name: Deploy Dev

# Manual-only. The dev environment is for experimentation; auto-deploying
# on every branch push produced a lot of noise in the Actions list for
# very little value. Run explicitly when you actually want dev updated:
#
#   gh workflow run deploy-dev.yml -f ref=<branch-name>

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or commit to deploy to dev'
        required: false
        type: string
        default: ''

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  migrate-db:
    name: Run D1 Migrations (Dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply quidsafe-dev --remote --config wrangler.worker.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-worker:
    name: Deploy Worker (Dev)
    runs-on: ubuntu-latest
    needs: migrate-db
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Deploy to Cloudflare Workers (dev)
        run: npx wrangler deploy --config wrangler.worker.toml --env dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post-deploy health check
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://quidsafe-api-dev.nathanlufc.workers.dev/health)
          if [ "$STATUS" != "200" ]; then
            echo "Dev health check failed with status $STATUS"
            exit 1
          fi
          echo "Dev health check passed (200 OK)"
