name: Deploy Staging Web

# Deploys the web app to staging.quidsafe.uk on every PR touching frontend.
# Users: see the PR comment for the staging URL, test before merging to prod.
#
# Requires these GitHub secrets:
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#   EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY_STAGING  (separate from prod key)
#   EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY_STAGING (separate from prod key)

on:
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'constants/**'
      - 'public/**'
      - 'app.json'
      - 'package.json'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-staging-web-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Staging Web
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Metro build
        uses: actions/cache@v4
        with:
          path: |
            .expo
            node_modules/.cache
          key: expo-staging-web-${{ runner.os }}-${{ hashFiles('package-lock.json', 'app.json') }}-${{ hashFiles('app/**', 'components/**', 'lib/**') }}

      - name: Build web for staging
        # Uses the same Clerk key as production - add staging.quidsafe.uk
        # to Clerk's allowed domains. Stripe uses test mode key.
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_API_URL: https://api-staging.quidsafe.uk
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY_STAGING || secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

      - name: Deploy to Cloudflare Pages (staging)
        id: deploy
        run: |
          OUTPUT=$(npx wrangler pages deploy dist --project-name quidsafe-staging --branch pr-${{ github.event.pull_request.number }} 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -Eo 'https://[a-z0-9-]+\.quidsafe-staging\.pages\.dev' | head -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment PR with staging URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}' || 'https://pr-${{ github.event.pull_request.number }}.quidsafe-staging.pages.dev';
            const body = `### 🚀 Staging deployed

            **Web:** ${url}
            **API:** https://api-staging.quidsafe.uk

            _Deployed from commit ${context.sha.substring(0, 7)}_`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes('Staging deployed'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
