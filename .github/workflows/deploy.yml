name: Deploy Production

# Production deploy.
#
# - Worker + Web auto-deploy on every merge to main (no manual gate).
#   Protection still exists: Cloudflare rollbacks are one click, and the
#   manual workflow_dispatch path is kept for rolling a specific commit.
# - D1 migrations are the ONLY step still behind a manual approval -
#   they're the genuinely dangerous case (schema changes can brick prod).
# - Mobile/iOS/Android is deployed separately via EAS Build, not this file.
#
# Rollback: `gh workflow run rollback.yml -f environment=production`

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'constants/**'
      - 'worker/**'
      - 'public/**'
      - 'wrangler.worker.toml'
      - 'package.json'
      - 'package-lock.json'
      - 'app.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      deploy_worker:
        description: 'Deploy Worker API'
        type: boolean
        default: true
      deploy_web:
        description: 'Deploy Web (Cloudflare Pages)'
        type: boolean
        default: true
      apply_migrations:
        description: 'Apply D1 migrations (manual approval required)'
        type: boolean
        default: false
      commit_sha:
        description: 'Commit SHA to deploy (blank = main HEAD)'
        type: string
        default: ''

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  migrate-db:
    name: Apply D1 Migrations (Production)
    runs-on: ubuntu-latest
    environment: production-migrations
    # Only runs when manually triggered with apply_migrations=true.
    # Push events never touch migrations - schema changes require a deliberate click.
    if: github.event_name == 'workflow_dispatch' && inputs.apply_migrations == true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Dry-run migrations (show what will apply)
        run: |
          echo "### Pending migrations" >> $GITHUB_STEP_SUMMARY
          ls -1 worker/migrations/*.sql | tee -a $GITHUB_STEP_SUMMARY

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply quidsafe-production --remote --config wrangler.worker.toml --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-worker:
    name: Deploy Worker (Production)
    runs-on: ubuntu-latest
    needs: [migrate-db]
    # Push events: always deploy Worker. Manual: respect the deploy_worker flag.
    # Wait for migrate-db only when it's running (not skipped).
    if: |
      always() &&
      (github.event_name == 'push' || inputs.deploy_worker == true) &&
      (needs.migrate-db.result == 'success' || needs.migrate-db.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Deploy Worker
        run: npx wrangler deploy --config wrangler.worker.toml --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Health check
        run: |
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "User-Agent: QuidSafe-CI/1.0" https://api.quidsafe.uk/health)
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health check returned $STATUS"
          else
            echo "✅ API healthy"
          fi

  deploy-web:
    name: Deploy Web (Production)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.deploy_web == true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Metro & Expo build artefacts
        uses: actions/cache@v4
        with:
          path: |
            .expo
            node_modules/.cache
          key: expo-web-${{ runner.os }}-${{ hashFiles('package-lock.json', 'app.json') }}-${{ hashFiles('app/**', 'components/**', 'lib/**', 'constants/**') }}

      - name: Build web (production)
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_ENVIRONMENT: production
          EXPO_PUBLIC_API_URL: https://api.quidsafe.uk
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name quidsafe --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summary
        run: |
          echo "### ✅ Production deployed" >> $GITHUB_STEP_SUMMARY
          echo "**Web:** https://quidsafe.uk" >> $GITHUB_STEP_SUMMARY
          echo "**API:** https://api.quidsafe.uk" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ inputs.commit_sha || github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }} · ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
