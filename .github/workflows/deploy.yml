name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Detect which paths changed so we only deploy what's needed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      worker: ${{ steps.filter.outputs.worker }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            worker:
              - 'worker/**'
              - 'wrangler.worker.toml'
              - 'lib/db.ts'
              - 'lib/types.ts'
            web:
              - 'app/**'
              - 'components/**'
              - 'lib/**'
              - 'constants/**'
              - 'public/**'
              - 'app.json'
              - 'package.json'
              - 'tsconfig.json'

  migrate-db:
    name: Run D1 Migrations
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply quidsafe-production --remote --config wrangler.worker.toml --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-worker:
    name: Deploy Worker (API)
    runs-on: ubuntu-latest
    needs: [changes, migrate-db]
    if: needs.changes.outputs.worker == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --config wrangler.worker.toml --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post-deploy health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "User-Agent: QuidSafe-CI/1.0" https://api.quidsafe.uk/health)
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health check returned status $STATUS (may be blocked by Cloudflare bot protection)"
          else
            echo "Health check passed (200 OK)"
          fi

  deploy-web:
    name: Deploy Web (Pages)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Metro & Expo build artefacts
        uses: actions/cache@v4
        with:
          path: |
            .expo
            node_modules/.cache
          key: expo-web-${{ runner.os }}-${{ hashFiles('package-lock.json', 'app.json') }}-${{ hashFiles('app/**', 'components/**', 'lib/**', 'constants/**') }}
          restore-keys: |
            expo-web-${{ runner.os }}-${{ hashFiles('package-lock.json', 'app.json') }}-
            expo-web-${{ runner.os }}-

      - name: Build web
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_API_URL: https://api.quidsafe.uk
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name quidsafe
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
